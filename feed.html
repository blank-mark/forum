<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Школьный форум — лента</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <style>
:root{
  --bg:#0f1220;
  --panel:#171b2e;
  --panel2:#1c2140;
  --text:#f5f7ff;
  --muted:#a6b0d6;
  --accent:#7c9cff;
  --accent2:#8ff3c8;
  --danger:#ff6b87;
  --line:rgba(255,255,255,.08);
  --shadow:0 16px 60px rgba(0,0,0,.35);
  --radius:24px;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:radial-gradient(1000px 700px at 15% 10%, rgba(124,156,255,.2), transparent 50%),
             radial-gradient(900px 600px at 90% 0%, rgba(143,243,200,.14), transparent 45%),
             var(--bg);
  color:var(--text);
  min-height:100vh;
}
a{color:inherit;text-decoration:none}
.wrap{max-width:1240px;margin:0 auto;padding:22px}
.topbar{
  display:flex;gap:12px;align-items:center;justify-content:space-between;
  padding:14px 18px;background:rgba(23,27,46,.85);backdrop-filter:blur(16px);
  border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow);position:sticky;top:14px;z-index:20
}
.brand{display:flex;align-items:center;gap:12px;font-weight:800;letter-spacing:.2px}
.logo{width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;color:#06111e;font-weight:900}
.nav{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.btn,.ghost,.danger,.tab{
  border:0;border-radius:16px;padding:11px 15px;font-weight:700;cursor:pointer;transition:.18s;
  display:inline-flex;align-items:center;justify-content:center;gap:8px
}
.btn{background:linear-gradient(135deg,var(--accent),#99b4ff);color:#0c1220}
.btn:hover,.ghost:hover,.danger:hover,.tab:hover{transform:translateY(-1px)}
.ghost,.tab{background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--line)}
.danger{background:rgba(255,107,135,.14);color:#ffd6de;border:1px solid rgba(255,107,135,.28)}
.grid{display:grid;grid-template-columns:360px 1fr;gap:18px;margin-top:18px}
.card{
  background:rgba(23,27,46,.82);backdrop-filter:blur(16px);
  border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:18px
}
.card h1,.card h2,.card h3{margin:0 0 14px}
.muted{color:var(--muted)}
.input,.textarea,select{
  width:100%;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.04);
  color:var(--text);padding:12px 14px;font:inherit;outline:none
}
.textarea{min-height:120px;resize:vertical}
.stack{display:grid;gap:12px}
.split{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--muted);font-size:13px}
.notice{padding:12px 14px;border-radius:16px;background:rgba(143,243,200,.12);border:1px solid rgba(143,243,200,.22);color:#d9fff0}
.dangerbox{padding:12px 14px;border-radius:16px;background:rgba(255,107,135,.12);border:1px solid rgba(255,107,135,.22);color:#ffd8e0}
.banner{margin-top:18px}
.posts{display:grid;gap:14px}
.post{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:22px;padding:16px}
.post-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.userline{display:flex;align-items:center;gap:12px;min-width:0}
.avatar{width:46px;height:46px;border-radius:16px;object-fit:cover;background:linear-gradient(135deg,rgba(124,156,255,.25),rgba(143,243,200,.25));border:1px solid rgba(255,255,255,.08)}
.name{font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.small{font-size:13px;color:var(--muted)}
.post-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.canvas-wrap{display:grid;gap:12px}
canvas{width:100%;max-width:360px;aspect-ratio:1;border-radius:22px;border:1px solid var(--line);background:white;touch-action:none}
.chatbox{display:grid;grid-template-rows:auto 1fr auto;gap:12px;min-height:70vh}
.messages{display:grid;gap:10px;overflow:auto;max-height:62vh;padding-right:4px}
.bubble{max-width:78%;padding:12px 14px;border-radius:18px;border:1px solid var(--line);background:rgba(255,255,255,.05)}
.mine{margin-left:auto;background:rgba(124,156,255,.18)}
.auth-card{max-width:520px;margin:40px auto 0}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.tab.active{background:rgba(124,156,255,.18);color:var(--text)}
.profile-mini{display:flex;align-items:center;gap:12px;padding:10px 0}
@media (max-width: 980px){
  .grid{grid-template-columns:1fr}
  .topbar{position:static}
}
</style>
</head>
<body>

<div class="wrap">
  <div class="topbar">
    <div class="brand"><div class="logo">F</div><div>Школьный форум</div></div>
    <div class="nav">
      <a class="ghost" href="profile.html">Профиль</a>
      <a class="ghost" href="messenger.html">Сообщения <span class="pill" id="unreadBadge" style="display:none;padding:4px 8px;margin-left:6px"></span></a>
      <button class="danger" id="logoutBtn" type="button">Выйти</button>
    </div>
  </div>

  <div class="banner" id="msgBanner" style="display:none"></div>

  <div class="grid">
    <div class="card">
      <h2>Новый пост</h2>
      <div class="stack">
        <textarea class="textarea" id="postText" placeholder="Напиши что-нибудь для школы..."></textarea>
        <button class="btn" id="postBtn" type="button">Опубликовать</button>
      </div>

      <div style="margin-top:18px">
        <h3>Кто ты</h3>
        <div class="profile-mini" id="meCard"></div>
      </div>
    </div>

    <div class="card">
      <div class="toolbar" style="margin-bottom:14px">
        <button class="tab active" data-mode="recent" type="button">Лента</button>
        <button class="tab" data-mode="best" type="button">Лучшие</button>
        <button class="tab" data-mode="likes" type="button">По лайкам</button>
        <button class="tab" data-mode="comments" type="button">По комментам</button>
        <button class="tab" data-mode="reposts" type="button">По репостам</button>
      </div>
      <div class="posts" id="posts"></div>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  "apiKey": "AIzaSyBBVZQBK-hdRdSHVKm3gWNNbnVYA6trekQ",
  "authDomain": "sosylksoset.firebaseapp.com",
  "projectId": "sosylksoset",
  "storageBucket": "sosylksoset.firebasestorage.app",
  "messagingSenderId": "322929691356",
  "appId": "1:322929691356:web:4457a6d844a60917be0219",
  "measurementId": "G-FGRR0RGW4D"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();
provider.setCustomParameters({ prompt: 'select_account' });

function qs(name) {
  return new URLSearchParams(location.search).get(name) || '';
}

function esc(value) {
  return String(value ?? '').replace(/[&<>'"]/g, ch => (
    { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch]
  ));
}

function toMillis(v) {
  if (!v) return 0;
  if (typeof v.toMillis === 'function') return v.toMillis();
  if (typeof v.seconds === 'number') return v.seconds * 1000;
  const n = new Date(v).getTime();
  return Number.isFinite(n) ? n : 0;
}

function fmtTime(v) {
  try {
    const d = v && typeof v.toDate === 'function' ? v.toDate() : new Date(toMillis(v));
    if (!Number.isFinite(d.getTime())) return 'только что';
    return new Intl.DateTimeFormat('ru-RU', { dateStyle: 'medium', timeStyle: 'short' }).format(d);
  } catch (e) {
    return 'только что';
  }
}

function avatarFor(user) {
  if (user && user.avatarDataURL) return user.avatarDataURL;
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(`
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
      <rect width="120" height="120" rx="26" fill="#e8ecff"/>
      <circle cx="60" cy="50" r="22" fill="#97a9ff"/>
      <path d="M24 104c6-21 22-32 36-32s30 11 36 32" fill="#97a9ff"/>
    </svg>
  `);
}

function shortText(text, n = 110) {
  const s = String(text || '').replace(/\s+/g, ' ').trim();
  return s.length > n ? s.slice(0, n - 1) + '…' : s;
}

function postBox(text, extra = '') {
  return `<div class="post">${extra}<div class="post-text">${esc(text || '')}</div></div>`;
}

async function ensureUserDoc(user, nickname = '') {
  const ref = db.collection('users').doc(user.uid);
  const snap = await ref.get();
  const base = {
    uid: user.uid,
    email: user.email || '',
    displayName: user.displayName || '',
    photoURL: user.photoURL || '',
    provider: user.providerData?.[0]?.providerId || 'password',
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
  };
  if (!snap.exists) {
    await ref.set({
      ...base,
      nickname: nickname || user.displayName || (user.email ? user.email.split('@')[0] : 'user'),
      bio: '',
      avatarDataURL: '',
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
  } else {
    const patch = { ...base };
    if (nickname) patch.nickname = nickname;
    await ref.set(patch, { merge: true });
  }
}

async function getUserDoc(uid) {
  const snap = await db.collection('users').doc(uid).get();
  return snap.exists ? snap.data() : null;
}

function requireAuth() {
  auth.onAuthStateChanged(user => {
    if (!user) location.href = 'index.html';
  });
}

async function logout() {
  await auth.signOut();
  location.href = 'index.html';
}

function openProfile(uid) {
  location.href = 'profile.html?uid=' + encodeURIComponent(uid);
}

function openMessenger(uid = '') {
  location.href = 'messenger.html' + (uid ? '?with=' + encodeURIComponent(uid) : '');
}

function postTypeLabel(p) {
  return p.type === 'repost' ? 'репост' : 'пост';
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

requireAuth();

let me = null;
let users = {};
let posts = [];
let chats = [];
let mode = 'recent';
let postsReady = false;
let usersReady = false;
let chatsReady = false;
const viewed = new Set(JSON.parse(localStorage.getItem('viewedPosts') || '[]'));
const postsEl = document.getElementById('posts');
const unreadBadge = document.getElementById('unreadBadge');
const msgBanner = document.getElementById('msgBanner');
const meCard = document.getElementById('meCard');

document.getElementById('logoutBtn').onclick = logout;
document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.onclick = () => {
    mode = btn.dataset.mode;
    document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    renderPosts();
  };
});

function currentUserView(uid) {
  return users[uid] || (me && me.uid === uid ? me : null) || { uid, nickname: 'user', bio: '', avatarDataURL: '' };
}

function postSortValue(p) {
  return toMillis(p.createdAt);
}

function sortedPosts() {
  const arr = posts.slice();
  if (mode === 'best') {
    return shuffle(arr.sort((a, b) => (b.viewsCount || 0) - (a.viewsCount || 0)).slice(0, 20));
  }
  if (mode === 'likes') return arr.sort((a, b) => (b.likesCount || 0) - (a.likesCount || 0));
  if (mode === 'comments') return arr.sort((a, b) => (b.commentsCount || 0) - (a.commentsCount || 0));
  if (mode === 'reposts') return arr.sort((a, b) => (b.repostsCount || 0) - (a.repostsCount || 0));
  return arr.sort((a, b) => postSortValue(b) - postSortValue(a));
}

function updateUnreadBanner() {
  if (!me) return;
  const unread = chats.filter(c => Array.isArray(c.members) && c.members.includes(me.uid) && ((c.unreadCounts && c.unreadCounts[me.uid]) || 0) > 0);
  if (!unread.length) {
    unreadBadge.style.display = 'none';
    msgBanner.style.display = 'none';
    msgBanner.innerHTML = '';
    return;
  }
  unreadBadge.style.display = 'inline-flex';
  unreadBadge.textContent = String(unread.length);
  const preview = unread.slice(0, 3).map(c => {
    const otherId = (c.members || []).find(id => id !== me.uid);
    const other = currentUserView(otherId);
    return '<div class="pill" style="margin:4px 8px 4px 0">' + esc(other.nickname || 'user') + ': ' + esc(shortText(c.lastMessage || 'Сообщение')) + '</div>';
  }).join('');
  msgBanner.style.display = 'block';
  msgBanner.innerHTML = '<div class="notice" style="display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap">' +
    '<div><strong>Вам написали</strong><div class="muted" style="margin-top:6px">Есть новые сообщения в чате.</div></div>' +
    '<div class="toolbar">' + preview + '<a class="btn" href="messenger.html">Ответить</a></div>' +
  '</div>';
}

function meCardHtml() {
  if (!me) return '<div class="muted">Загрузка...</div>';
  return '<div class="userline" style="margin-bottom:10px">' +
    '<img class="avatar" src="' + esc(avatarFor(me)) + '" alt="avatar">' +
    '<div><div class="name">' + esc(me.nickname || 'user') + '</div><div class="small">' + esc(me.email || '') + '</div></div>' +
  '</div>' +
  '<div class="toolbar">' +
    '<a class="ghost" href="profile.html">Мой профиль</a>' +
    '<a class="ghost" href="messenger.html">Сообщения</a>' +
  '</div>';
}

async function addViewOnce(postId) {
  if (viewed.has(postId)) return;
  viewed.add(postId);
  localStorage.setItem('viewedPosts', JSON.stringify(Array.from(viewed).slice(-500)));
  try {
    await db.collection('posts').doc(postId).update({
      viewsCount: firebase.firestore.FieldValue.increment(1)
    });
  } catch (e) {}
}

function renderPost(p) {
  const owner = currentUserView(p.uid);
  const createdAt = fmtTime(p.createdAt);
  const isRepost = p.type === 'repost';
  const repostInfo = isRepost ? (
    '<div class="notice" style="margin:12px 0 0">' +
      '<div class="small">Репост из профиля ' + esc((currentUserView(p.originalUid || p.uid).nickname || 'user')) + '</div>' +
      '<div style="margin-top:6px;white-space:pre-wrap">' + esc(p.originalPreview || '') + '</div>' +
    '</div>'
  ) : '';
  return `
    <div class="post" data-postid="${p.id}">
      <div class="post-head">
        <div class="userline">
          <a href="profile.html?uid=${encodeURIComponent(p.uid)}" title="Профиль">
            <img class="avatar" src="${esc(avatarFor(owner))}" alt="avatar">
          </a>
          <div>
            <div class="name"><a href="profile.html?uid=${encodeURIComponent(p.uid)}">${esc(owner.nickname || 'user')}</a></div>
            <div class="small">${createdAt} · ${postTypeLabel(p)}${p.repostOf ? ' · из репоста' : ''}</div>
          </div>
        </div>
        <div class="small">${Number(p.viewsCount || 0)} просмотров</div>
      </div>

      <div class="post-text" style="white-space:pre-wrap;line-height:1.55">${esc(p.text || '')}</div>
      ${repostInfo}

      <div class="post-actions">
        <button class="ghost" data-action="like" data-id="${p.id}">Лайк <span id="likeCount-${p.id}">${Number(p.likesCount || 0)}</span></button>
        <button class="ghost" data-action="repost" data-id="${p.id}">Репост <span id="repostCount-${p.id}">${Number(p.repostsCount || 0)}</span></button>
        <button class="ghost" data-action="openProfile" data-uid="${p.uid}">Профиль</button>
        <button class="ghost" data-action="message" data-uid="${p.uid}">Написать</button>
      </div>

      <div class="comments-box" id="comments-${p.id}"></div>

      <div class="stack" style="margin-top:10px">
        <input class="input" id="commentInput-${p.id}" placeholder="Комментарий">
        <button class="btn" data-action="comment" data-id="${p.id}" type="button">Отправить комментарий</button>
      </div>
    </div>
  `;
}

async function loadComments(postId) {
  const box = document.getElementById('comments-' + postId);
  if (!box) return;
  try {
    const snap = await db.collection('posts').doc(postId).collection('comments').orderBy('createdAt', 'desc').limit(3).get();
    if (snap.empty) {
      box.innerHTML = '<div class="small" style="margin-top:10px">Комментариев пока нет</div>';
      return;
    }
    box.innerHTML = '<div class="stack" style="margin-top:10px">' + snap.docs.map(d => {
      const c = d.data();
      const u = currentUserView(c.uid);
      return '<div class="pill" style="display:block;padding:10px 12px;border-radius:18px">' +
        '<div class="small"><strong>' + esc(u.nickname || 'user') + '</strong> · ' + esc(fmtTime(c.createdAt)) + '</div>' +
        '<div style="margin-top:6px;white-space:pre-wrap;line-height:1.45">' + esc(c.text || '') + '</div>' +
      '</div>';
    }).join('') + '</div>';
  } catch (e) {
    box.innerHTML = '<div class="dangerbox">Не удалось загрузить комментарии</div>';
  }
}

async function renderPosts() {
  if (!usersReady || !postsReady) return;
  const list = sortedPosts();
  meCard.innerHTML = meCardHtml();
  postsEl.innerHTML = list.length ? list.map(renderPost).join('') : '<div class="muted">Постов пока нет — стань первым.</div>';
  list.forEach(p => addViewOnce(p.id));
  list.forEach(p => loadComments(p.id));
}

document.getElementById('postBtn').onclick = async () => {
  try {
    const text = document.getElementById('postText').value.trim();
    if (!text) throw new Error('Напиши текст поста');
    await db.collection('posts').add({
      uid: me.uid,
      nickname: me.nickname || me.displayName || 'user',
      avatarDataURL: me.avatarDataURL || '',
      text,
      type: 'post',
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      likesCount: 0,
      commentsCount: 0,
      repostsCount: 0,
      viewsCount: 0
    });
    document.getElementById('postText').value = '';
  } catch (e) {
    alert(e.message);
  }
};

postsEl.addEventListener('click', async (e) => {
  const btn = e.target.closest('button[data-action]');
  if (!btn) return;
  const id = btn.dataset.id;
  const action = btn.dataset.action;
  const postRef = db.collection('posts').doc(id);
  if (action === 'openProfile') {
    openProfile(btn.dataset.uid);
    return;
  }
  if (action === 'message') {
    openMessenger(btn.dataset.uid);
    return;
  }
  try {
    if (action === 'like') {
      const likeRef = postRef.collection('likes').doc(me.uid);
      const likeSnap = await likeRef.get();
      if (likeSnap.exists) {
        await likeRef.delete();
        await postRef.update({ likesCount: firebase.firestore.FieldValue.increment(-1) });
      } else {
        await likeRef.set({
          uid: me.uid,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        await postRef.update({ likesCount: firebase.firestore.FieldValue.increment(1) });
      }
    }
    if (action === 'repost') {
      const srcSnap = await postRef.get();
      const src = srcSnap.data() || {};
      await db.collection('posts').add({
        uid: me.uid,
        nickname: me.nickname || me.displayName || 'user',
        avatarDataURL: me.avatarDataURL || '',
        text: src.text ? ('Репост: ' + src.text) : 'Репост',
        type: 'repost',
        repostOf: id,
        originalUid: src.uid || '',
        originalPreview: shortText(src.text || ''),
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        likesCount: 0,
        commentsCount: 0,
        repostsCount: 0,
        viewsCount: 0
      });
      await postRef.update({ repostsCount: firebase.firestore.FieldValue.increment(1) });
    }
    if (action === 'comment') {
      const input = document.getElementById('commentInput-' + id);
      const text = (input.value || '').trim();
      if (!text) throw new Error('Напиши комментарий');
      await postRef.collection('comments').add({
        uid: me.uid,
        nickname: me.nickname || me.displayName || 'user',
        avatarDataURL: me.avatarDataURL || '',
        text,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      await postRef.update({ commentsCount: firebase.firestore.FieldValue.increment(1) });
      input.value = '';
    }
  } catch (err) {
    alert(err.message);
  }
});

auth.onAuthStateChanged(async user => {
  if (!user) return;
  await ensureUserDoc(user);
  me = await getUserDoc(user.uid);
  if (!me) me = { uid: user.uid, nickname: user.displayName || 'user' };
  db.collection('users').onSnapshot(snap => {
    users = {};
    snap.docs.forEach(d => { users[d.id] = d.data(); });
    me = users[user.uid] || me;
    usersReady = true;
    updateUnreadBanner();
    renderPosts();
  });
  db.collection('posts').onSnapshot(snap => {
    posts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    postsReady = true;
    renderPosts();
  });
  db.collection('chats').onSnapshot(snap => {
    chats = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    chatsReady = true;
    updateUnreadBanner();
  });
});
</script>
