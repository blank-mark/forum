<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Школьный форум — профиль</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <style>
    :root{
      --bg:#0f1220;
      --panel:#171b2e;
      --panel2:#1c2140;
      --text:#f5f7ff;
      --muted:#a6b0d6;
      --accent:#7c9cff;
      --accent2:#8ff3c8;
      --danger:#ff6b87;
      --line:rgba(255,255,255,.08);
      --shadow:0 16px 60px rgba(0,0,0,.35);
      --radius:24px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:radial-gradient(1000px 700px at 15% 10%, rgba(124,156,255,.2), transparent 50%),
                 radial-gradient(900px 600px at 90% 0%, rgba(143,243,200,.14), transparent 45%),
                 var(--bg);
      color:var(--text);
      min-height:100vh;
    }
    a{color:inherit;text-decoration:none}
    .wrap{max-width:1200px;margin:0 auto;padding:22px}
    .topbar{
      display:flex;gap:12px;align-items:center;justify-content:space-between;
      padding:14px 18px;background:rgba(23,27,46,.85);backdrop-filter:blur(16px);
      border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow);position:sticky;top:14px;z-index:20
    }
    .brand{display:flex;align-items:center;gap:12px;font-weight:800;letter-spacing:.2px}
    .logo{width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;color:#06111e;font-weight:900}
    .nav{display:flex;gap:10px;flex-wrap:wrap}
    .btn,.ghost,.danger{
      border:0;border-radius:16px;padding:11px 15px;font-weight:700;cursor:pointer;transition:.18s;
      display:inline-flex;align-items:center;justify-content:center;gap:8px
    }
    .btn{background:linear-gradient(135deg,var(--accent),#99b4ff);color:#0c1220}
    .btn:hover{transform:translateY(-1px)}
    .ghost{background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--line)}
    .danger{background:rgba(255,107,135,.14);color:#ffd6de;border:1px solid rgba(255,107,135,.28)}
    .grid{display:grid;grid-template-columns:360px 1fr;gap:18px;margin-top:18px}
    .card{
      background:rgba(23,27,46,.82);backdrop-filter:blur(16px);
      border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
      padding:18px
    }
    .card h2,.card h3{margin:0 0 14px}
    .muted{color:var(--muted)}
    .input,.textarea,select{
      width:100%;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.04);
      color:var(--text);padding:12px 14px;font:inherit;outline:none
    }
    .textarea{min-height:120px;resize:vertical}
    .stack{display:grid;gap:12px}
    .split{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--muted);font-size:13px}
    .hero{display:grid;grid-template-columns:1.2fr .8fr;gap:18px;margin-top:18px;align-items:start}
    .posts{display:grid;gap:14px}
    .post{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:22px;padding:16px}
    .post-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
    .userline{display:flex;align-items:center;gap:12px;min-width:0}
    .avatar{width:46px;height:46px;border-radius:16px;object-fit:cover;background:linear-gradient(135deg,rgba(124,156,255,.25),rgba(143,243,200,.25));border:1px solid rgba(255,255,255,.08)}
    .name{font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .small{font-size:13px;color:var(--muted)}
    .post-actions{display:flex;gap:8px;flex-wrap:wrap}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .canvas-wrap{display:grid;gap:12px}
    canvas{width:100%;max-width:360px;aspect-ratio:1;border-radius:22px;border:1px solid var(--line);background:white;touch-action:none}
    .chatbox{display:grid;grid-template-rows:auto 1fr auto;gap:12px;min-height:70vh}
    .messages{display:grid;gap:10px;overflow:auto;max-height:62vh;padding-right:4px}
    .bubble{max-width:75%;padding:12px 14px;border-radius:18px;border:1px solid var(--line);background:rgba(255,255,255,.05)}
    .mine{margin-left:auto;background:rgba(124,156,255,.18)}
    .auth-card{max-width:520px;margin:40px auto 0}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
    .tab{padding:10px 14px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.04);cursor:pointer;color:var(--muted);font-weight:700}
    .tab.active{background:rgba(124,156,255,.18);color:var(--text)}
    .notice{padding:12px 14px;border-radius:16px;background:rgba(143,243,200,.12);border:1px solid rgba(143,243,200,.22);color:#d9fff0}
    .dangerbox{padding:12px 14px;border-radius:16px;background:rgba(255,107,135,.12);border:1px solid rgba(255,107,135,.22);color:#ffd8e0}
    @media (max-width: 980px){.grid,.hero{grid-template-columns:1fr}.topbar{position:static}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand"><div class="logo">F</div><div>Профиль</div></div>
      <div class="nav">
        <a class="ghost" href="feed.html">Лента</a>
        <a class="ghost" href="messenger.html">Мессенджер</a>
        <button class="danger" id="logoutBtn">Выйти</button>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2 id="title">Профиль</h2>
        <div class="stack">
          <div class="userline">
            <img class="avatar" id="profileAvatar" alt="avatar" />
            <div>
              <div class="name" id="nickname">Загрузка…</div>
              <div class="small" id="email"></div>
            </div>
          </div>
          <div class="muted" id="bioText"></div>
        </div>

        <div id="editArea" style="display:none;margin-top:18px">
          <h3>Редактирование</h3>
          <div class="stack">
            <input class="input" id="nickInput" placeholder="Ник" />
            <textarea class="textarea" id="bioInput" placeholder="О себе"></textarea>
            <div class="canvas-wrap">
              <canvas id="drawCanvas" width="300" height="300"></canvas>
              <div class="toolbar">
                <label class="pill">Цвет <input type="color" id="colorPick" value="#111111" style="margin-left:8px;border:0;background:transparent;height:28px;width:40px"></label>
                <label class="pill">Размер <input type="range" id="sizePick" min="1" max="30" value="5" style="margin-left:8px"></label>
              </div>
              <div class="toolbar">
                <button class="ghost" id="clearCanvas">Очистить</button>
                <button class="btn" id="saveProfile">Сохранить профиль</button>
              </div>
            </div>
            <div class="notice">Рисуешь мышкой или пальцем прямо в квадрате — это и будет аватар.</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>Посты пользователя</h3>
        <div class="posts" id="userPosts"></div>
      </div>
    </div>
  </div>

  <script>const firebaseConfig = {
  apiKey: "AIzaSyBBVZQBK-hdRdSHVKm3gWNNbnVYA6trekQ",
  authDomain: "sosylksoset.firebaseapp.com",
  projectId: "sosylksoset",
  storageBucket: "sosylksoset.firebasestorage.app",
  messagingSenderId: "322929691356",
  appId: "1:322929691356:web:4457a6d844a60917be0219",
  measurementId: "G-FGRR0RGW4D"
};
const app = firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
auth.useDeviceLanguage();

const provider = new firebase.auth.GoogleAuthProvider();
provider.setCustomParameters({ prompt: 'select_account' });

function qs(name){ return new URLSearchParams(location.search).get(name) || ''; }
function esc(s){ return String(s ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function timeText(v){
  if(!v) return 'только что';
  try{
    const d = v.toDate ? v.toDate() : new Date(v);
    return new Intl.DateTimeFormat('ru-RU', { dateStyle:'medium', timeStyle:'short' }).format(d);
  }catch(e){ return 'только что'; }
}
async function ensureUserDoc(user, nickname){
  const ref = db.collection('users').doc(user.uid);
  const snap = await ref.get();
  const data = {
    uid: user.uid,
    email: user.email || '',
    displayName: user.displayName || '',
    photoURL: user.photoURL || '',
    provider: user.providerData?.[0]?.providerId || 'password',
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
  };
  if(!snap.exists){
    await ref.set({
      ...data,
      nickname: nickname || (user.displayName || user.email?.split('@')[0] || 'user'),
      bio: '',
      avatarDataURL: '',
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
  } else if(nickname){
    await ref.set({ ...data, nickname }, { merge:true });
  } else {
    await ref.set(data, { merge:true });
  }
}
async function getUserDoc(uid){
  const snap = await db.collection('users').doc(uid).get();
  return snap.exists ? snap.data() : null;
}
function requireAuth(){
  auth.onAuthStateChanged(user => {
    if(!user) location.href = 'index.html';
  });
}
async function logout(){ await auth.signOut(); location.href = 'index.html'; }

requireAuth();
const viewUid = qs('uid');
const userPosts = document.getElementById('userPosts');
const profileAvatar = document.getElementById('profileAvatar');
const nicknameEl = document.getElementById('nickname');
const emailEl = document.getElementById('email');
const bioText = document.getElementById('bioText');
const editArea = document.getElementById('editArea');
const title = document.getElementById('title');

let viewedUser = null;
let isOwner = false;
let canvas, ctx, drawing = false, last = null;

function setAvatar(src){
  if(src){ profileAvatar.src = src; profileAvatar.style.display = 'block'; }
  else { profileAvatar.removeAttribute('src'); profileAvatar.style.display = 'none'; profileAvatar.style.background = 'linear-gradient(135deg, rgba(124,156,255,.25), rgba(143,243,200,.25))'; }
}

async function loadProfile(){
  const me = auth.currentUser;
  if(!me) return;
  const uid = viewUid || me.uid;
  viewedUser = await getUserDoc(uid);
  if(!viewedUser) {
    nicknameEl.textContent = 'Профиль не найден';
    bioText.textContent = '';
    userPosts.innerHTML = '<div class="muted">Нет данных</div>';
    return;
  }
  isOwner = me.uid === uid;
  title.textContent = isOwner ? 'Мой профиль' : 'Профиль пользователя';
  nicknameEl.textContent = viewedUser.nickname || 'user';
  emailEl.textContent = viewedUser.email || '';
  bioText.textContent = viewedUser.bio || 'Пока без описания';
  setAvatar(viewedUser.avatarDataURL || '');
  if(isOwner){
    editArea.style.display = 'block';
    document.getElementById('nickInput').value = viewedUser.nickname || '';
    document.getElementById('bioInput').value = viewedUser.bio || '';
    setupCanvas(viewedUser.avatarDataURL || '');
  } else {
    editArea.style.display = 'none';
  }
  const snap = await db.collection('posts').where('uid','==',uid).orderBy('createdAt','desc').limit(30).get();
  userPosts.innerHTML = snap.empty ? '<div class="muted">Постов пока нет.</div>' : snap.docs.map(docSnap => {
    const p = docSnap.data();
    return `<div class="post"><div class="small">${timeText(p.createdAt)}</div><div style="white-space:pre-wrap;line-height:1.55;margin-top:8px">${esc(p.text || '')}</div></div>`;
  }).join('');
}

function setupCanvas(existing){
  canvas = document.getElementById('drawCanvas');
  ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  if(existing){
    const img = new Image();
    img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0,canvas.width,canvas.height); };
    img.src = existing;
  }
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  const getPos = (e) => {
    const r = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x:(clientX-r.left)*(canvas.width/r.width), y:(clientY-r.top)*(canvas.height/r.height) };
  };
  const start = (e) => { drawing = true; last = getPos(e); e.preventDefault(); };
  const move = (e) => {
    if(!drawing) return;
    const pos = getPos(e);
    ctx.strokeStyle = document.getElementById('colorPick').value;
    ctx.lineWidth = Number(document.getElementById('sizePick').value);
    ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(pos.x,pos.y); ctx.stroke();
    last = pos; e.preventDefault();
  };
  const end = () => { drawing = false; last = null; };
  canvas.onmousedown = start; window.onmousemove = move; window.onmouseup = end;
  canvas.ontouchstart = start; canvas.ontouchmove = move; window.ontouchend = end;
}

document.getElementById('logoutBtn').onclick = logout;
document.getElementById('clearCanvas').onclick = () => {
  if(!ctx) return;
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height);
};
document.getElementById('saveProfile').onclick = async () => {
  try {
    const me = auth.currentUser; if(!me) throw new Error('Нет входа');
    const nick = document.getElementById('nickInput').value.trim();
    const bio = document.getElementById('bioInput').value.trim();
    const avatarDataURL = canvas.toDataURL('image/png');
    await db.collection('users').doc(me.uid).set({
      nickname: nick || 'user',
      bio,
      avatarDataURL,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    }, { merge:true });
    await loadProfile();
    alert('Сохранено');
  } catch (e) { alert(e.message); }
};

auth.onAuthStateChanged(() => loadProfile());
  </script>
</body>
</html>
